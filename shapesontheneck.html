<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet">
<style>

  :root {
    --ink:      #0d0700;
    --paper:    #f7eecc;
    --aged:     #dcc98a;
    --sepia:    #3a2000;
    --deep:     #1a0800;
    --red:      #8b1a1a;
    --gold:     #b8860b;
    --border:   #5a3a00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    font-family: 'Special Elite', 'Courier New', Courier, monospace;
    min-height: 100vh;
    padding: 1.5rem 1.2rem 5rem;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    color: var(--ink);
    overflow-x: hidden;
  }

  button { outline: none; }
  button:focus { outline: none; }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 0; margin-bottom: 0;
    width: 100%; max-width: 980px;
    border-bottom: 3px solid var(--border);
  }
  .tab-btn {
    font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    font-size: 1.05rem; font-weight: 700;
    padding: 0.55rem 1.8rem;
    border: 2px solid var(--border); border-bottom: none;
    background: var(--aged); cursor: pointer; color: var(--deep);
    transition: all 0.15s; letter-spacing: 0.08em; text-transform: uppercase;
    margin-right: 4px; border-radius: 4px 4px 0 0;
    position: relative; top: 3px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .tab-btn:hover { background: var(--paper); color: var(--deep); }
  .help-btn {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 0.85rem; font-weight: 900;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--paper);
    color: var(--deep);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    margin-left: 6px;
    position: relative;
    vertical-align: middle;
    flex-shrink: 0;
  }
  .help-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .help-tooltip {
    display: none;
    position: absolute;
    top: 28px; left: 0;
    z-index: 999;
    background: #8b1a1a;
    color: var(--paper);
    font-family: Georgia, serif;
    font-size: 0.95rem;
    line-height: 1.5;
    padding: 0.6rem 0.8rem;
    border-radius: 4px;
    width: 260px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    pointer-events: none;
    white-space: normal;
  }
  .help-btn:hover .help-tooltip,
  .help-btn:focus .help-tooltip,
  .help-btn.open .help-tooltip { display: block; }
  .tab-btn.active {
    background: var(--paper); color: var(--ink);
    border-color: var(--border);
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1rem;
    margin-top: 0.8rem;
    width: 100%;
    max-width: 980px;
  }
  .ctrl-group { display: flex; align-items: center; gap: 0.35rem; }

  .key-row { display: flex; gap: 0.2rem; flex-wrap: nowrap; }

  .key-btn {
    background: var(--paper);
    border: 2px solid var(--border);
    color: var(--deep);
    font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    font-size: 1.15rem; font-weight: 700;
    padding: 0.3rem 0.75rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.12s;
    min-width: 38px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .key-btn:hover { border-color: var(--deep); color: var(--deep); background: var(--aged); }
  .key-btn.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }
  .key-btn-acc { font-size: 0.95rem; padding: 0.3rem 0.5rem; min-width: 34px; background: var(--aged); }
  .key-btn.active:hover { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  .pill-group { display: flex; border-radius: 3px; overflow: hidden; border: 2px solid var(--border); }
  .pill-btn {
    background: var(--paper);
    border: none; border-right: 1px solid var(--border);
    color: var(--deep);
    font-family: 'Special Elite', 'Courier New', Courier, monospace;
    font-size: 1.1rem; padding: 0.3rem 0.9rem;
    cursor: pointer; transition: all 0.12s;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .pill-btn:last-child { border-right: none; }
  .pill-btn:hover { background: var(--aged); color: var(--deep); }
  .pill-btn.active { background: var(--ink); color: var(--paper); }
  .pill-btn.active:hover { background: var(--ink); color: var(--paper); }

  .caged-toggle-btn {
    background: var(--paper);
    border: 2px solid var(--border);
    color: var(--deep);
    font-family: 'Special Elite', 'Courier New', Courier, monospace;
    font-size: 0.95rem; padding: 0.3rem 1rem;
    border-radius: 3px; cursor: pointer; transition: all 0.12s;
    display: inline-flex; align-items: center; justify-content: center;
    line-height: 1; text-align: center;
  }
  .caged-toggle-btn:hover { border-color: var(--deep); color: var(--deep); }
  .caged-toggle-btn.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }
  .caged-toggle-btn.active:hover { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  .sharp-btn {
    font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    font-size: 1.2rem; font-weight: 900;
    padding: 0.3rem 0.75rem; border-radius: 3px;
    border: 2px solid var(--border); background: var(--paper);
    cursor: pointer; transition: all 0.12s; color: var(--deep);
    min-width: 36px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .sharp-btn:hover { border-color: var(--deep); color: var(--deep); }
  .sharp-btn.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }
  .sharp-btn.active:hover { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  /* ── Diagram card ── */
  .diagram-wrap {
    width: 100%;
    max-width: 980px;
    overflow-x: auto;
    overflow-y: visible;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x pan-y;
  }
  .diagram-card {
    background: transparent;
    padding: 0;
    position: relative;
  }

  svg { display: block; height: auto; }

  

  
    .tabs, .controls { max-width: 100%; }
    .diagram-wrap {
      width: calc(100vw - 1rem);
      max-width: calc(100vw - 1rem);
    }
  }

  /* ── CAGED row ── */
  .caged-row {
    position: relative; height: 60px; overflow: visible;
  }
  .caged-active {
    padding-top: 20px;
  }
  .caged-ltr {
    position: absolute;
    font-family: 'Special Elite', 'Courier New', Courier, monospace;
    font-weight: 900;
    font-size: clamp(1.2rem, 3vw, 2.4rem);
    line-height: 1; top: 6px;
  }
  @media (max-width: 700px) {
    .caged-row { height: 44px; }
    .caged-ltr { font-size: 1.4rem; top: 4px; }
  }

  /* ── I-IV-V bar ── */
  .ivv-bar {
    display: flex;
    justify-content: flex-start;
    margin-bottom: 0.8rem;
    gap: 0.4rem;
  }
  .ivv-btn {
    font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    font-size: 1.1rem; font-weight: 700; font-style: italic;
    padding: 0.35rem 1.2rem; border-radius: 3px;
    border: 2px solid var(--border); background: var(--paper);
    cursor: pointer; transition: all 0.12s; color: var(--deep);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .ivv-btn:hover { border-color: var(--deep); }
  #ivv1.active { background: #7a3010; border-color: #5a2008; color: var(--paper); }
  #ivv4.active { background: #1a5080; border-color: #0a3060; color: var(--paper); }
  #ivv5.active { background: #1a6030; border-color: #0a4020; color: var(--paper); }

  @media (max-width: 700px) {
    body { padding: 1rem 0.5rem 3rem; }
    .tabs, .controls { max-width: 100%; }
    .diagram-wrap {
      width: calc(100vw - 1rem);
      max-width: calc(100vw - 1rem);
    }
  }

  @media (hover: none) {
    .key-btn:hover { background: var(--paper); color: var(--deep); border-color: var(--border); }
    .key-btn.active:hover { background: var(--ink); border-color: var(--ink); color: var(--paper); }
    .pill-btn:hover { background: var(--paper); color: var(--deep); }
    .pill-btn.active:hover { background: var(--ink); color: var(--paper); }
    .caged-toggle-btn:hover { background: var(--paper); color: var(--deep); border-color: var(--border); }
    .caged-toggle-btn.active:hover { background: var(--ink); border-color: var(--ink); color: var(--paper); }
    .sharp-btn:hover { background: var(--paper); color: var(--deep); border-color: var(--border); }
    .sharp-btn.active:hover { background: var(--ink); border-color: var(--ink); color: var(--paper); }
    .vtype-btn:hover { background: var(--paper); color: var(--deep); }
    .vtype-btn.active:hover { background: var(--ink); color: var(--paper); }
  }

  @media (max-width: 700px) {
    .key-btn { min-width: 32px; padding: 0.25rem 0.5rem; font-size: 1rem; }
    .sharp-btn { min-width: 30px; padding: 0.25rem 0.5rem; font-size: 1rem; }
    .controls { gap: 0.5rem; }
    .pill-btn { font-size: 0.95rem; padding: 0.25rem 0.6rem; }
  }

  .vtype-sub { opacity: 0.85; }
  .vtype-btn {
    background: #ede0c0;
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: 'Special Elite', 'Courier New', Courier, monospace;
    font-size: 1.05rem;
    padding: 0.35rem 0.5rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.12s;
    line-height: 1.3;
    text-align: center;
    white-space: nowrap;
  }
  .vtype-btn.triad {
    background: var(--paper);
    border-color: var(--border);
    color: var(--deep);
  }
  .vtype-btn.triad span { color: var(--muted); }
  .vtype-btn.triad:hover { background: var(--light); }
  .vtype-btn.triad.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }
  .vtype-btn.triad.active span { color: #c4a265; }
  .vtype-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }
  .vtype-btn.ext-hint {
    border-color: #8b1a1a;
    box-shadow: inset 0 0 0 1px #8b1a1a;
  }
  .vtype-btn:hover { background: var(--light); color: var(--deep); }
  .vtype-btn.active:hover { background: var(--ink); color: var(--paper); }

  .strroot-btn {
    background: var(--paper);
    border: 1.5px solid var(--border);
    color: var(--deep);
    font-family: 'Special Elite', 'Courier New', monospace;
    font-size: 0.95rem;
    padding: 0.35rem 0.6rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.12s;
  }
  .strroot-btn:hover { background: var(--aged); }
  .strroot-btn.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }
  .strroot-btn.active:hover { background: var(--ink); color: var(--paper); }

</style>
</head>

<script>

const KEYS_EXPANDED = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const KEY_PC = { C:0, 'C#':1, D:2, Eb:3, E:4, F:5, 'F#':6, G:7, Ab:8, A:9, Bb:10, B:11 };
let KEYS_SHOW = KEYS; // current visible keys
const OPEN_PC = [4,9,2,7,11,4]; // low-E A D G B high-e
const SNAMES  = ['E','A','D','G','B','e'];

const MAJ_INT   = [0,2,4,5,7,9,11];
const MAJ_DEG   = ['R','2','3','4','5','6','7'];
const MIN_INT   = [0,2,3,5,7,8,10];
const MIN_DEG   = ['R','2','b3','4','5','b6','b7'];
const PENTA_INT  = [0,2,4,7,9];
const PENTA_DEG  = ['R','2','3','5','6'];
const MPENTA_INT = [0,3,5,7,10];
const MPENTA_DEG = ['R','b3','4','5','b7'];

function noteAt(s,f){ return (OPEN_PC[s]+f)%12; }

function buildNotes(key, scaleType, rootOverride){
  const root = rootOverride !== undefined ? rootOverride : KEY_PC[key];
  const usePenta = scaleType === 'penta' || scaleType === 'mpenta';
  const isMinor  = scaleType === 'minor' || scaleType === 'mpenta';
  const ints = usePenta ? (isMinor ? MPENTA_INT : PENTA_INT) : (isMinor ? MIN_INT : MAJ_INT);
  const degs = usePenta ? (isMinor ? MPENTA_DEG : PENTA_DEG) : (isMinor ? MIN_DEG : MAJ_DEG);
  const inScale = new Set(ints.map(i=>(root+i)%12));
  const degMap  = {};
  ints.forEach((i,idx) => { degMap[(root+i)%12] = degs[idx]; });
  const out = [];
  for(let s=0; s<6; s++)
    for(let f=0; f<=13; f++){
      const pc = noteAt(s,f);
      if(inScale.has(pc))
        out.push({ string:s, fret:f, degree:degMap[pc], noteName:ALL_NOTES[pc] });
    }
  return out;
}

//  CAGED SHAPE DEFINITIONS
//  Each shape is defined by its open chord fingering.
//  anchorOpenPC = open pitch class of the anchor string
//  notes = [{str, df, deg}] where df = fret offset from anchor fret
//
//  C-shape: open C chord (x32010), anchor = A-string
//  A-shape: A barre chord (x02220), anchor = A-string
//  G-shape: open G chord (320003), anchor = G-string
//  E-shape: open E chord (022100), anchor = low-E string
//  D-shape: open D chord (xx0232), anchor = D-string
// ══════════════════════════════════════

// Build a lookup: for a given key, return a Map of "str,fret" → [{deg, shape}, ...]
// Stores ALL shapes that claim a note (for split-circle rendering)
function buildCagedMap(rootPC) {
  const map = new Map();
  // First pass: place all direct notes
  for(const [name, def] of Object.entries(SHAPE_DEFS)){
    const anchorFret = (rootPC - def.anchorOpenPC + 12) % 12;
    for(const n of def.notes){
      const fret = anchorFret + n.df;
      if(fret < 0 || fret > 13) continue;
      const key = `${n.str},${fret}`;
      if(!map.has(key)) map.set(key, []);
      map.get(key).push({ deg: n.deg, shape: def });
    }
  }
  // Second pass: mirror fret 12/13 → open string, only if no direct note already there
  for(const [name, def] of Object.entries(SHAPE_DEFS)){
    const anchorFret = (rootPC - def.anchorOpenPC + 12) % 12;
    for(const n of def.notes){
      const fret = anchorFret + n.df;
      if(fret < 12 || fret > 13) continue;
      const openFret = fret - 12;
      const openKey = `${n.str},${openFret}`;
      if(!map.has(openKey)){
        map.set(openKey, [{ deg: n.deg, shape: def }]);
      }
    }
  }
  return map;
}

// Resolve a moveable template to frets, picking octave for tightest spread
function resolveVoicing(rootPC, tmpl){
  const candidates = {};
  Object.entries(tmpl.strings).forEach(([sStr, iv]) => {
    const s = parseInt(sStr);
    const base = (rootPC + iv - OPEN_PC[s] + 48) % 12;
    candidates[s] = [base, base+12].filter(f => f>=0 && f<=13);
  });
  const strKeys = Object.keys(candidates).map(Number);
  let best = null, bestScore = Infinity;
  for(let anchor=0; anchor<=13; anchor++){
    const result = {};
    strKeys.forEach(s => {
      const opts = candidates[s];
      if(opts.length) result[s] = opts.reduce((a,b) => Math.abs(a-anchor)<=Math.abs(b-anchor)?a:b);
    });
    if(Object.keys(result).length < strKeys.length) continue;
    const fvals = Object.values(result);
    const spread = Math.max(...fvals) - Math.min(...fvals);
    if(spread <= 4){
      const score = spread*100 + Math.min(...fvals);
      if(score < bestScore){ bestScore=score; best={...result}; }
    }
  }
  return best || {};
}

// Get the best voicing for rootPC + quality ('maj','m','maj7','m7','6')
function getBestVoicing(rootPC, quality){
  quality = quality || 'maj';
  const noteName = ALL_NOTES[rootPC];
  // Normalize quality to the key used in OPEN_VOICINGS
  const openQuality = quality === 'maj' ? 'major' : quality === 'm' ? 'minor' : quality === 'maj6' ? 'maj6' : quality === 'dim7' ? 'dim7' : quality;
  const openKey = `${noteName}_${openQuality}`;
  if(OPEN_VOICINGS[openKey]) return OPEN_VOICINGS[openKey];
  const templates = VOICING_TEMPLATES[quality] || VOICING_TEMPLATES.maj;
  const resolved = templates.map(t => resolveVoicing(rootPC, t)).filter(f => Object.keys(f).length>0);
  // Sort ascending by lowest fret — prefer the lowest position on the neck
  resolved.sort((a,b) => Math.min(...Object.values(a)) - Math.min(...Object.values(b)));
  return resolved[0] || {};
}

// Maps semitone interval → degree label, per chord quality
const QUALITY_INTERVALS = {
  maj:  { 0:'R', 4:'3', 7:'5' },
  m:    { 0:'R', 3:'b3', 7:'5' },
  maj7: { 0:'R', 4:'3', 7:'5', 11:'7' },
  m7:   { 0:'R', 3:'b3', 7:'5', 10:'b7' },
  m7add5: { 0:'R', 3:'♭3', 7:'5', 10:'♭7' },
  dom7: { 0:'R', 4:'3', 7:'5', 10:'b7' },
  maj6: { 0:'R', 4:'3', 7:'5', 9:'6' },
  dim:  { 0:'R', 3:'b3', 6:'b5' },
  dim7: { 0:'R', 3:'b3', 6:'b5', 9:'6' },
  min6: { 0:'R', 3:'b3', 9:'6' },
  min6b5: { 0:'R', 3:'b3', 6:'b5', 9:'6' },
  aug:  { 0:'R', 4:'3', 10:'b7', 8:'♯5' },
  dom9: { 0:'R', 4:'3', 10:'b7', 2:'2' },
  dom13: { 0:'R', 4:'3', 10:'b7', 9:'6' },
  m7b5: { 0:'R', 3:'b3', 6:'b5', 10:'b7' },
};

// Full chromatic fallback for any interval from a root
const CHROMATIC_DEGREES = {
  0:'R', 1:'b2', 2:'2', 3:'b3', 4:'3', 5:'4',
  6:'b5', 7:'5', 8:'b6', 9:'6', 10:'b7', 11:'7'
};

function buildChordNotes(rootPC, quality){
  quality = quality || 'maj';
  const frets = getBestVoicing(rootPC, quality);
  const ivMap = QUALITY_INTERVALS[quality] || QUALITY_INTERVALS.maj;
  const result = [];
  Object.entries(frets).forEach(([sStr, fret]) => {
    const s = parseInt(sStr);
    if(fret < 0 || fret > 15) return;
    const pc = (OPEN_PC[s] + fret) % 12;
    const iv = (pc - rootPC + 12) % 12;
    const deg = ivMap[iv] || '?';
    if(deg === '?') return;
    result.push({ string:s, fret, degree:deg, noteName:ALL_NOTES[pc] });
  });
  return result;
}

// For 6th string root: root on str 0, other notes on str 3 (G) and str 4 (B)
// For 5th string root: root on str 1, other notes on str 2 (D) and str 4 (B)

function buildShellNotes(rootPC, quality, stringRoot){
  const offsets = (SHELL_OFFSETS[quality] || {})[stringRoot];
  if(!offsets) return [];
  const anchorStr = stringRoot === 6 ? 0 : 1;
  let rootFret = (rootPC - OPEN_PC[anchorStr] + 12) % 12;
  if(rootFret === 0) rootFret = 12;

  return offsets.map(o => {
    if(o.s === anchorStr){
      return { string: o.s, fret: rootFret, pc: rootPC, degree: o.label };
    }
    // dfret: explicit fret offset from root — bypasses interval logic
    if(o.dfret !== undefined){
      const fret = rootFret + o.dfret;
      const pc = (OPEN_PC[o.s] + fret) % 12;
      return { string: o.s, fret, pc, degree: o.label };
    }
    const INTERVALS = {'R':0,'3':4,'5':7,'7':11,'♭7':10,'6':9,'♭3':3,'♭5':6,'♯5':8,'9':2,'2':2,'11':5,'13':9};
    const interval = INTERVALS[o.label] !== undefined ? INTERVALS[o.label] : 0;
    const targetPC = (rootPC + interval) % 12;
    let fret = (targetPC - OPEN_PC[o.s] + 12) % 12;
    // find nearest occurrence to rootFret
    while(fret + 12 <= 15 && Math.abs(fret + 12 - rootFret) < Math.abs(fret - rootFret)) fret += 12;
    while(fret - 12 >= 0  && Math.abs(fret - 12 - rootFret) < Math.abs(fret - rootFret)) fret -= 12;
    // if octave:+1 flag, force one octave higher
    if(o.octave === 1){
      if(fret + 12 <= 15) fret += 12;
    }
    return { string: o.s, fret, pc: targetPC, degree: o.label };
  }).filter(n => n.fret >= 0 && n.fret <= 15);
}

function identifyChord(notes) {
  if(!notes || notes.length === 0) return '—';
  // Get unique pitch classes
  const pcs = [...new Set(notes.map(n => n.pc))];
  if(pcs.length < 2) return ALL_NOTES[pcs[0]] || '—';

  // Try each PC as root
  let bestMatch = null;
  let bestScore = -1;

  for(const rootPC of pcs){
    const intervals = pcs.map(pc => (pc - rootPC + 12) % 12).sort((a,b) => a-b);
    for(const pattern of CHORD_PATTERNS){
      const patSet = new Set(pattern.intervals);
      const intSet = new Set(intervals);
      // Check if pattern intervals are subset of played intervals
      const covered = pattern.intervals.every(i => intSet.has(i));
      if(!covered) continue;
      // Score: more notes matched = better, prefer exact match
      const extra = intervals.filter(i => !patSet.has(i)).length;
      const score = pattern.intervals.length * 10 - extra;
      if(score > bestScore){
        bestScore = score;
        bestMatch = { root: ALL_NOTES[rootPC], suffix: pattern.name };
      }
    }
  }

  if(bestMatch) return bestMatch.root + bestMatch.suffix;

  // Fallback: just list the note names
  return pcs.map(pc => ALL_NOTES[pc]).join('/');
}

  if(TAB === 'chord'){
    const occupiedKeys = new Set(BUILDER_NOTES.map(n => `${n.string},${n.fret}`));
    for(let s=0; s<6; s++){
      for(let f=0; f<=13; f++){
        if(occupiedKeys.has(`${s},${f}`)) continue; // note circle handles click
        const x = fx(f);
        const y = sy(s);
        const hit = svgEl('circle');
        setA(hit,{cx:x,cy:y,r:NR,fill:'rgba(0,0,0,0)',stroke:'none',cursor:'pointer'});
        hit.addEventListener('click', () => {
          const pc = (OPEN_PC[s] + f) % 12;
          // Remove any existing note on this string first (one note per string)
          const idx = BUILDER_NOTES.findIndex(bn => bn.string === s);
          if(idx >= 0) BUILDER_NOTES.splice(idx, 1);
          BUILDER_NOTES.push({ string:s, fret:f, pc });
          // If this string had no base note, that's fine — it's a new addition
          detectChordQuality();
          render();
        });
        svg.appendChild(hit);
      }
    }
  }

  // ── Fret dots + numbers combined (dot behind number) ──
  const fnY = nutY2 + (isMobile ? 30 : 40);
  const dotFrets = new Set([3,5,7,9,12]);
  for(let f=FRET_START+1; f<=FRET_START+NF; f++){
    const x = LP+(f-FRET_START-0.5)*fw;
    if(dotFrets.has(f)){
        const c=svgEl('circle');
        setA(c,{cx:x,cy:fnY-5,r:isMobile?14:10,fill:'#d4b870'});
        svg.appendChild(c);
      }
    const t=svgEl('text');
    setA(t,{x,y:fnY,fill: dotFrets.has(f) ? '#1a0800' : '#5a3a00','font-size':isMobile?'16':'13','font-weight':'800',
            'font-family':"'Special Elite','Courier New',Courier,monospace",'text-anchor':'middle'});
    t.textContent=f;
    svg.appendChild(t);
  }

  // Degree maps alias from scale-aware ivvDegMapsBase
  const ivvDegMaps = ivvDegMapsBase;

  // Helper: draw circle split into N equal pie slices with degree labels centered in each slice
  function drawSplitCircle(cx, cy, r, colors, degs) {
    const n = colors.length;
    if(n === 1){
      const circ = svgEl('circle');
      setA(circ,{cx,cy,r,fill:colors[0].fill,stroke:colors[0].stroke,'stroke-width':'2'});
      svg.appendChild(circ);
      const t = svgEl('text');
      setA(t,{x:cx,y:cy+5,fill:'#111','font-size':degs[0].length>1?'14':'17','font-weight':'900',
              'font-family':"'Special Elite','Courier New',Courier,monospace",'text-anchor':'middle'});
      t.textContent=degs[0]; svg.appendChild(t);
      return;
    }
    const angleStep = (2*Math.PI)/n;
    colors.forEach((col, i) => {
      const a1 = -Math.PI/2 + i*angleStep;
      const a2 = a1 + angleStep;
      const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
      const x2 = cx + r*Math.cos(a2), y2 = cy + r*Math.sin(a2);
      const path = svgEl('path');
      setA(path,{
        d:`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`,
        fill:col.fill, stroke:col.stroke, 'stroke-width':'1.5'
      });
      svg.appendChild(path);
      // label centered in slice at ~58% radius
      const aMid = a1 + angleStep/2;
      const tx = cx + r*0.58*Math.cos(aMid);
      const ty = cy + r*0.58*Math.sin(aMid) + 4;
      const t = svgEl('text');
      setA(t,{x:tx,y:ty,fill:'#111','font-size':degs[i].length>1?'11':'13','font-weight':'900',
              'font-family':"'Special Elite','Courier New',Courier,monospace",'text-anchor':'middle'});
      t.textContent=degs[i]; svg.appendChild(t);
    });
    const ring = svgEl('circle');
    setA(ring,{cx,cy,r,fill:'none',stroke:'#2a1500','stroke-width':'1.5'});
    svg.appendChild(ring);
  }

  // ── Notes ──
  notes.forEach(n => {
    if(n.fret<0||n.fret>13) return;
    const x = fx(n.fret);
    const y = sy(n.string);
    const cagedKey = `${n.string},${n.fret}`;
    const cagedEntries = cagedMap ? cagedMap.get(cagedKey) : null;
    const isRoot = n.degree === 'R';
    const pc = (OPEN_PC[n.string] + n.fret) % 12;

    if(MODE === 'ivv'){
      const inScales = [1,4,5].filter(s => ivvSets[s].has(pc));
      const show = inScales.filter(s => IVV_ACTIVE.has(s));
      if(show.length > 0){
        const degs = show.map(s => LABEL.has('note') && !LABEL.has('degree') ? ALL_NOTES[pc] : (ivvDegMaps[s][pc]||''));
        drawSplitCircle(x, y, NR, show.map(s => IVV_COLORS[s]), degs);
      } else {
        const c = svgEl('circle');
        setA(c,{cx:x,cy:y,r:NR,fill:'#fdf5e0',stroke:'#5a3a0a','stroke-width':'1.5'});
        svg.appendChild(c);
      }
      return;
    }

    // Normal mode
    let fill, stroke;
    if(cagedEntries && cagedEntries.length > 0 && SHOW_CAGED){
      fill   = cagedEntries[0].shape.color;
      stroke = cagedEntries[0].shape.stroke;
    } else if(HIGHLIGHTED_DEGS.size > 0 && HIGHLIGHTED_DEGS.has(n.degree)){
      const dc = DEG_COLORS[n.degree] || { fill:'#888', stroke:'#444' };
      fill = dc.fill; stroke = dc.stroke;
    } else if(TAB === 'chord'){
      if(isRoot){
        fill = '#6b1a1a'; stroke = '#3a0808';  // dark red for root
      } else {
        fill = '#fdf5e0'; stroke = '#5a3a0a';  // cream for all other notes
      }
    } else if(cagedEntries && cagedEntries.length > 0){
      fill   = cagedEntries[0].shape.color;
      stroke = cagedEntries[0].shape.stroke;
    } else {
      fill   = '#fdf5e0';
      stroke = '#5a3a0a';
    }

    const c = svgEl('circle');
    setA(c,{cx:x,cy:y,r:NR,fill,stroke,'stroke-width':'2.5',cursor:'pointer'});
    c.addEventListener('click', () => {
      if(TAB === 'chord'){
        const idx = BUILDER_NOTES.findIndex(bn => bn.string===n.string && bn.fret===n.fret);
        if(idx >= 0){
          BUILDER_NOTES.splice(idx, 1);
          // If removed note was a manually added note (not in base voicing),
          // restore the base voicing note on that string if one existed
          const baseOnString = BASE_VOICING_NOTES.find(bn => bn.string === n.string);
          const stillHasString = BUILDER_NOTES.some(bn => bn.string === n.string);
          if(baseOnString && !stillHasString){
            BUILDER_NOTES.push({...baseOnString});
          }
        } else {
          // Remove any other note on this string first, then add
          const strIdx = BUILDER_NOTES.findIndex(bn => bn.string===n.string);
          if(strIdx >= 0) BUILDER_NOTES.splice(strIdx, 1);
          BUILDER_NOTES.push({ string:n.string, fret:n.fret, pc:(OPEN_PC[n.string]+n.fret)%12 });
        }
        detectChordQuality();
        render();
      } else {
        const deg = n.degree;
        if(HIGHLIGHTED_DEGS.has(deg)) HIGHLIGHTED_DEGS.delete(deg);
        else HIGHLIGHTED_DEGS.add(deg);
        render();
      }
    });
    svg.appendChild(c);

    // Labels inside circle — both, degree only, or note only
    const noteName = ALL_NOTES[(OPEN_PC[n.string] + n.fret) % 12];
    const showDeg  = LABEL.has('degree');
    const showNote = LABEL.has('note');
    const isColored = TAB === 'chord' ? isRoot
                    : (HIGHLIGHTED_DEGS.size > 0 && HIGHLIGHTED_DEGS.has(n.degree))
                      || (cagedEntries && cagedEntries.length > 0 && SHOW_CAGED);
    const lblColor = isColored ? '#ffffff' : '#5a3a0a';

    const addClickHandler = (el) => {
      el.style.cursor = 'pointer';
      el.addEventListener('click', () => {
        if(TAB === 'chord'){
          const ci = BUILDER_NOTES.findIndex(bn => bn.string===n.string && bn.fret===n.fret);
          if(ci >= 0){
            BUILDER_NOTES.splice(ci, 1);
            const baseOnString = BASE_VOICING_NOTES.find(bn => bn.string === n.string);
            const stillHasString = BUILDER_NOTES.some(bn => bn.string === n.string);
            if(baseOnString && !stillHasString) BUILDER_NOTES.push({...baseOnString});
          } else {
            const strIdx = BUILDER_NOTES.findIndex(bn => bn.string===n.string);
            if(strIdx >= 0) BUILDER_NOTES.splice(strIdx, 1);
            BUILDER_NOTES.push({ string:n.string, fret:n.fret, pc:(OPEN_PC[n.string]+n.fret)%12 });
          }
          detectChordQuality();
          render();
        } else {
          const deg = n.degree;
          if(HIGHLIGHTED_DEGS.has(deg)) HIGHLIGHTED_DEGS.delete(deg);
          else HIGHLIGHTED_DEGS.add(deg);
          render();
        }
      });
    };

    if(showDeg && showNote){
      // Both: degree on top, note name on bottom — both inside circle
      const tDeg = svgEl('text');
      setA(tDeg,{x, y:y-3, fill:lblColor, 'font-size':'13', 'font-weight':'900',
                 'font-family':"'Special Elite','Courier New',Courier,monospace", 'text-anchor':'middle'});
      tDeg.textContent = n.degree;
      addClickHandler(tDeg);
      svg.appendChild(tDeg);

      const tNote = svgEl('text');
      setA(tNote,{x, y:y+10, fill:lblColor, 'font-size':'11', 'font-weight':'700',
                  'font-family':"'Special Elite','Courier New',Courier,monospace", 'text-anchor':'middle'});
      tNote.textContent = noteName;
      addClickHandler(tNote);
      svg.appendChild(tNote);

    } else if(showDeg){
      const degStr = n.degree;
      const small = degStr.length > 1;
      const t = svgEl('text');
      setA(t,{x, y:y+6, fill:lblColor,
              'font-size': '16',
              'font-weight':'900',
              'font-family':"'Special Elite','Courier New',Courier,monospace",
              'text-anchor':'middle'});
      t.textContent = degStr;
      addClickHandler(t);
      svg.appendChild(t);

    } else if(showNote){
      const small = noteName.length > 1;
      const t = svgEl('text');
      setA(t,{x, y:y+6, fill:lblColor,
              'font-size': '16',
              'font-weight':'900',
              'font-family':"'Special Elite','Courier New',Courier,monospace",
              'text-anchor':'middle'});
      t.textContent = noteName;
      addClickHandler(t);
      svg.appendChild(t);
    }

  });

  requestAnimationFrame(() => renderCagedLetters(rootPC, fw, LP));
}

//  CAGED LETTER LABELS
//  One letter per shape, positioned above its anchor fret
// ══════════════════════════════════════
function renderCagedLetters(rootPC, fw, LP){
  const row = document.getElementById('cagedRow');
  row.style.display = SHOW_CAGED ? 'block' : 'none';
  if(!SHOW_CAGED){ row.innerHTML=''; return; }
  row.innerHTML='';

  const svgW   = 900;
  const svgEl2  = document.getElementById('fb');
  const svgRect = svgEl2.getBoundingClientRect();
  const renderedWidth = svgRect.width || svgEl2.clientWidth || svgW;
  const sc      = renderedWidth / svgW;

  for(const [name, def] of Object.entries(SHAPE_DEFS)){
    const anchorFret = (rootPC - def.anchorOpenPC + 12) % 12;

    const validNotes = def.notes
      .map(n => ({ str: n.str, fret: anchorFret + n.df }))
      .filter(n => n.fret >= 0 && n.fret <= 13);
    if(validNotes.length === 0) continue;
    let lowestNote;
    if(def.labelStr !== undefined){
      lowestNote = validNotes.find(n => n.str === def.labelStr) || validNotes[0];
    } else {
      validNotes.sort((a, b) => a.str - b.str);
      lowestNote = validNotes[0];
    }
    const svgX = lowestNote.fret === 0 ? LP - fw*0.6 : LP + (lowestNote.fret - 0.5)*fw;
    const xPx  = svgX * sc;

    const span = document.createElement('span');
    span.className = 'caged-ltr';
    span.style.left  = xPx+'px';
    span.style.transform = 'translateX(-50%)';
    span.style.color = def.color;
    span.style.textShadow = 'none';
    span.textContent = name;
    row.appendChild(span);
  }
}

// ── CHORD QUALITY DETECTION ──
function detectChordQuality(){
  if(SELECTED_CHORD_PC === null || !BUILDER_NOTES.length) return;
  const ivSet = new Set(
    BUILDER_NOTES.map(n => (((OPEN_PC[n.string] + n.fret) % 12) - SELECTED_CHORD_PC + 12) % 12)
  );
  let bestQuality = null, bestScore = -1;
  Object.entries(QUALITY_INTERVALS).forEach(([q, ivMap]) => {
    const qIvs = new Set(Object.keys(ivMap).map(Number));
    // Every board interval must be in this quality
    if(![...ivSet].every(iv => qIvs.has(iv))) return;
    // Score: matched intervals, penalize large gaps between quality size and board size
    const score = ivSet.size - Math.abs(qIvs.size - ivSet.size) * 0.5;
    if(score > bestScore){ bestScore = score; bestQuality = q; }
  });
  if(!bestQuality || bestQuality === CHORD_VOICING_TYPE) return;
  CHORD_VOICING_TYPE = bestQuality;
  document.querySelectorAll('.vtype-btn').forEach(b => b.classList.toggle('active', b.dataset.v === bestQuality));
  // Update chord name display
  const nameEl = document.getElementById('chordNameText');
  const tonesEl = document.getElementById('chordTonesText');
  if(nameEl){
    const rootName = ALL_NOTES[SELECTED_CHORD_PC];
    const suffixMap = {maj:'',maj7:'maj7',dom7:'7',maj6:'6',m:'m',m7:'m7',dim7:'m6',dim:'dim°',aug:'aug',dom9:'9',dom13:'13',m7b5:'ø',m7add5:'m7'};
    const altSuffixMap = {dim7:'dim7'};
    const primary = rootName + (suffixMap[bestQuality] !== undefined ? suffixMap[bestQuality] : bestQuality);
    const alt = altSuffixMap[bestQuality] ? ` / ${rootName}${altSuffixMap[bestQuality]}` : '';
    nameEl.textContent = primary + alt;
  }
  const CHORD_TONES = {maj:'(R 3 5)',maj7:'(R 3 7)',dom7:'(R 3 ♭7)',maj6:'(R 3 6)',m:'(R ♭3 5)',m7:'(R ♭3 ♭7)',dim7:'(R ♭3 ♭5 6)',dim:'(R ♭3 ♭5)',aug:'(R 3 ♯5)',dom9:'(R 3 ♭7 9)',dom13:'(R 3 ♭7 13)',m7b5:'(R ♭3 ♭5 ♭7)',m7add5:'(R ♭3 5 ♭7)'};
  if(tonesEl) tonesEl.textContent = CHORD_TONES[bestQuality] || '';
}
let CAROUSEL_INDEX = 0;
let CAROUSEL_VOICINGS = []; // [{type:'open'|6|5, label, rootFret}]

function buildCarouselVoicings(rootPC, quality){
  const voicings = [];
  // Open voicing
  const openFrets = getBestVoicing(rootPC, quality);
  if(Object.keys(openFrets).length){
    const minFret = Math.min(...Object.values(openFrets).filter(f=>f>0));
    voicings.push({ type:'open', label:'Open', sortFret: isFinite(minFret) ? minFret : 0 });
  }
  // 6th string shells — find all octave positions
  if(SHELL_OFFSETS[quality] && SHELL_OFFSETS[quality][6]){
    const anchorStr = 0;
    for(let rootFret = 1; rootFret <= 12; rootFret++){
      const pc = (OPEN_PC[anchorStr] + rootFret) % 12;
      if(pc === rootPC){
        voicings.push({ type:6, label:'6', sortFret: rootFret, rootFret });
      }
    }
  }
  // 5th string shells
  if(SHELL_OFFSETS[quality] && SHELL_OFFSETS[quality][5]){
    const anchorStr = 1;
    for(let rootFret = 1; rootFret <= 12; rootFret++){
      const pc = (OPEN_PC[anchorStr] + rootFret) % 12;
      if(pc === rootPC){
        voicings.push({ type:5, label:'5', sortFret: rootFret, rootFret });
      }
    }
  }
  // Sort by fret position low to high
  voicings.sort((a,b) => a.sortFret - b.sortFret);
  return voicings;
}

function applyCarouselVoicing(voicing){
  if(!voicing || SELECTED_CHORD_PC === null) return;
  BUILDER_NOTES = [];
  BASE_VOICING_NOTES = [];
  if(voicing.type === 'open'){
    const _prevType = CAROUSEL_VOICINGS[CAROUSEL_INDEX]?.type ?? 'open'; const _prevRootFret = CAROUSEL_VOICINGS[CAROUSEL_INDEX]?.rootFret ?? null; SHELL_STRING_ROOT = 'open';
    // falls through to buildChordNotes in render
  } else {
    SHELL_STRING_ROOT = voicing.type;
    const sn = buildShellNotes(SELECTED_CHORD_PC, CHORD_VOICING_TYPE || SELECTED_CHORD_QUALITY, voicing.type);
    // filter to only notes near this specific rootFret
    const filtered = sn.filter(n => Math.abs(n.fret - voicing.rootFret) <= 5 || n.fret === voicing.rootFret);
    BUILDER_NOTES = filtered.map(n => ({string:n.string, fret:n.fret, pc:n.pc}));
    BASE_VOICING_NOTES = BUILDER_NOTES.map(n=>({...n}));
  }
}

function updateCarousel(){
  if(SELECTED_CHORD_PC === null) return;
  CAROUSEL_VOICINGS = buildCarouselVoicings(SELECTED_CHORD_PC, CHORD_VOICING_TYPE || SELECTED_CHORD_QUALITY);
  CAROUSEL_INDEX = Math.min(CAROUSEL_INDEX, Math.max(0, CAROUSEL_VOICINGS.length - 1));
  const v = CAROUSEL_VOICINGS[CAROUSEL_INDEX];
  const label = document.getElementById('carouselLabel');
  const pos = document.getElementById('carouselPos');
  if(label) label.textContent = v ? v.label : '—';
  if(pos) pos.textContent = CAROUSEL_VOICINGS.length > 1 ? `${CAROUSEL_INDEX+1} / ${CAROUSEL_VOICINGS.length}` : '';
  applyCarouselVoicing(v);
}

function preserveAndUpdateCarousel(prevType){
  prevType = prevType ?? CAROUSEL_VOICINGS[CAROUSEL_INDEX]?.type ?? 'open';
  updateCarousel();
  const idx = CAROUSEL_VOICINGS.findIndex(v => v.type === prevType);
  if(idx >= 0){ CAROUSEL_INDEX = idx; updateCarousel(); }
}

    btn.dataset.key = k;
    btn.textContent = k;
    btn.onclick = () => {
      if(TAB === 'chord'){
        if(CHORD_KEYS.has(k)){
          if(CHORD_KEYS.size > 1) CHORD_KEYS.delete(k);
        } else {
          CHORD_KEYS.add(k);
        }
        document.querySelectorAll('.key-btn').forEach(b => {
          b.classList.toggle('active', CHORD_KEYS.has(b.dataset.key));
          b.style.background = ''; b.style.borderColor = ''; b.style.color = '';
        });
        KEY = k;
        // Auto-select the I chord of the clicked key
        const firstChords = getChordRow(k);
        const firstChord = firstChords[0] || '';
        const firstMatch = firstChord.match(/^([A-G][#b]?)(.*)/);
        const flatMap2 = {'Bb':10,'Eb':3,'Ab':8,'Db':1,'Gb':6};
        const firstRootName = firstMatch ? firstMatch[1] : firstChord;
        const firstRawQuality = firstMatch ? firstMatch[2] : '';
        const firstQuality = firstRawQuality === '' ? 'maj' : firstRawQuality;
        const firstRootPC = flatMap2[firstRootName] !== undefined ? flatMap2[firstRootName] : (ALL_PC[firstRootName] !== undefined ? ALL_PC[firstRootName] : 0);
        SELECTED_CHORD_PC = firstRootPC;
        SELECTED_CHORD_QUALITY = firstQuality;
        SELECTED_CHORD_KEY = k;
        CHORD_VOICING_TYPE = firstQuality;
        const _prevType1 = CAROUSEL_VOICINGS[CAROUSEL_INDEX]?.type ?? 'open';
        SHELL_STRING_ROOT = 'open';
        document.querySelectorAll('.vtype-btn').forEach(b => b.classList.toggle('active', b.dataset.v === firstQuality));
        BUILDER_NOTES = [];
        BASE_VOICING_NOTES = [];
        preserveAndUpdateCarousel(_prevType1);
      } else {
        document.querySelectorAll('.key-btn').forEach(b => {
          b.classList.remove('active');
          b.style.background = ''; b.style.borderColor = ''; b.style.color = '';
        });
        btn.classList.add('active');
        KEY = k;
        CHORD_KEYS = new Set([k]);
        HIGHLIGHTED_DEGS = new Set(['R']);
      }
      render();
    };
    keyRow.appendChild(btn);
  });
}

// Diatonic chord qualities: maj, min, min, maj, maj, min, dim
// Notes per key (natural notes only — sharps handled via ALL_NOTES/rootPC offset)
const DIA_NOTES = {
  C:  ['C','D','E','F','G','A','B'],
  'C#':['C#','D#','F','F#','G#','A#','C'],
  D:  ['D','E','F#','G','A','B','C#'],
  'D#':['D#','F','G','G#','A#','C','D'],
  Eb: ['Eb','F','G','Ab','Bb','C','D'],
  E:  ['E','F#','G#','A','B','C#','D#'],
  F:  ['F','G','A','Bb','C','D','E'],
  'F#':['F#','G#','A#','B','C#','D#','F'],
  Gb: ['Gb','Ab','Bb','B','Db','Eb','F'],
  G:  ['G','A','B','C','D','E','F#'],
  'G#':['G#','A#','C','C#','D#','F','G'],
  Ab: ['Ab','Bb','C','Db','Eb','F','G'],
  A:  ['A','B','C#','D','E','F#','G#'],
  'A#':['A#','C','D','D#','F','G','A'],
  Bb: ['Bb','C','D','Eb','F','G','A'],
  B:  ['B','C#','D#','E','F#','G#','A#'],
  Db: ['Db','Eb','F','Gb','Ab','Bb','C'],
};
const DIA_QUALITIES = ['','m','m','','','m','dim'];
const DIA_QUALITIES_MINOR = ['m','dim','','m','m','',''];

function getChordRow(keyName){
  // keyName e.g. 'C', 'C#', 'F#'
  const qualities = MINOR_MODE ? DIA_QUALITIES_MINOR : DIA_QUALITIES;
  // Natural minor intervals: W H W W H W W  (0,2,3,5,7,8,10)
  const intervals = MINOR_MODE ? [0,2,3,5,7,8,10] : [0,2,4,5,7,9,11];
  const baseKey = Object.keys(DIA_NOTES).find(k => k === keyName);
  let notes;
  if(baseKey && !MINOR_MODE){
    notes = DIA_NOTES[baseKey];
  } else {
    const rpc = ALL_PC[keyName] !== undefined ? ALL_PC[keyName] : (KEY_PC[keyName] !== undefined ? KEY_PC[keyName] : getKeyPC());
    notes = intervals.map(i => ALL_NOTES[(rpc+i)%12]);
  }
  return notes.map((n,i) => n + qualities[i]);
}

function buildDiatonicTable(){
  const table = document.getElementById('diaTable');
  table.innerHTML = '';
  const degLabels = ['1','2','3','4','5','6','7'];
  // Apply sharp shift to active keys
  const activeKeys = [...CHORD_KEYS];

  // One row per degree
  const firstKey = activeKeys[0];
  const firstKeyChords = getChordRow(firstKey); // e.g. ['C','Dm','Em','F','G','Am','Bdim']

  degLabels.forEach((deg, i) => {
    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';

    // Parse chord name from the first key column to get root PC and quality
    const chordName = firstKeyChords[i] || '';
    // Extract root note and quality suffix (e.g. 'Bb' + 'm', 'F#' + 'dim', 'C' + '')
    const rootMatch = chordName.match(/^([A-G][#b]?)(.*)/);
    const chordRootName = rootMatch ? rootMatch[1] : chordName;
    const rawQuality = rootMatch ? rootMatch[2] : '';
    const diaQuality = rawQuality === '' ? 'maj' : rawQuality;
    // Resolve root name to PC — handle flats (Bb=A#=10, Eb=D#=3, Ab=G#=8)
    const flatMap = {'Bb':10,'Eb':3,'Ab':8,'Db':1,'Gb':6};
    const chordRootPC = flatMap[chordRootName] !== undefined ? flatMap[chordRootName] : (ALL_PC[chordRootName] !== undefined ? ALL_PC[chordRootName] : 0);

    const thD = document.createElement('td');
    thD.textContent = deg;
    thD.style.cssText = "padding:4px 6px; background:#e8d9b0; font-weight:900; text-align:center; border:1px solid #c4a265; color:#6b3a1f; font-family:'Special Elite','Courier New',Courier,monospace; width:24px; font-size:0.85rem;";
    tr.appendChild(thD);

    activeKeys.forEach(k => {
      const chords = getChordRow(k);
      const cellChordName = chords[i] || '';
      // Parse root PC and quality from THIS cell's chord name
      const cellMatch = cellChordName.match(/^([A-G][#b]?)(.*)/);
      const cellRootName = cellMatch ? cellMatch[1] : cellChordName;
      const cellRawQuality = cellMatch ? cellMatch[2] : '';
      const cellQuality = cellRawQuality === '' ? 'maj' : cellRawQuality;
      const cellRootPC = flatMap[cellRootName] !== undefined ? flatMap[cellRootName] : (ALL_PC[cellRootName] !== undefined ? ALL_PC[cellRootName] : 0);

      const isSelected = SELECTED_CHORD_PC === cellRootPC && SELECTED_CHORD_QUALITY === cellQuality && SELECTED_CHORD_KEY === k;
      const td = document.createElement('td');
      td.textContent = cellChordName;
      td.style.cssText = 'padding:6px 12px; background:'+(isSelected?'#2a1000':'#f5edd6')+'; color:'+(isSelected?'#f7eecc':'#1c1008')+'; text-align:left; border:1px solid #7a5510; font-weight:400; font-family:\'Special Elite\',\'Courier New\',Courier,monospace; font-size:0.95rem; cursor:pointer;';
      td.addEventListener('mouseenter', () => { if(!isSelected) td.style.background = '#e8d9b0'; });
      td.addEventListener('mouseleave', () => { td.style.background = isSelected ? '#2a1000' : '#f5edd6'; });
      td.addEventListener('click', () => {
        SELECTED_CHORD_PC = cellRootPC;
        SELECTED_CHORD_QUALITY = cellQuality;
        SELECTED_CHORD_KEY = k;
        CHORD_VOICING_TYPE = CHORD_VOICING_TYPE || cellQuality;
        document.querySelectorAll('.vtype-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.v === CHORD_VOICING_TYPE);
        });
        BUILDER_NOTES = [];
        BASE_VOICING_NOTES = [];
        // Preserve string root type (open/6/5) across chord changes — fret will differ per root
        const prevType = CAROUSEL_VOICINGS[CAROUSEL_INDEX]?.type ?? 'open';
        updateCarousel();
        const sameType = CAROUSEL_VOICINGS.findIndex(v => v.type === prevType);
        if(sameType >= 0){ CAROUSEL_INDEX = sameType; updateCarousel(); }
        render();
      });
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });
}

// Shape tab builder state — parallel to BUILDER_NOTES in chord tab
let SHAPE_BUILDER_NOTES = []; // [{string, fret, pc}]
let SHAPE_BASE_NOTES = [];
let SHAPE_ROOT_PC = 0; // C by default (moveable shape anchor)

function detectShapeQuality(){
  if(!SHAPE_BUILDER_NOTES.length) return;
  const ivSet = new Set(
    SHAPE_BUILDER_NOTES.map(n => (((OPEN_PC[n.string] + n.fret) % 12) - SHAPE_ROOT_PC + 12) % 12)
  );
  let bestQ = null, bestScore = -1;
  Object.entries(QUALITY_INTERVALS).forEach(([q, ivMap]) => {
    const qIvs = new Set(Object.keys(ivMap).map(Number));
    if(![...ivSet].every(iv => qIvs.has(iv))) return;
    const score = ivSet.size - Math.abs(qIvs.size - ivSet.size) * 0.5;
    if(score > bestScore){ bestScore = score; bestQ = q; }
  });
  if(!bestQ) return;
  SHAPES_QUALITY = bestQ;
  const bar = document.getElementById('shapesQualityBar');
  if(bar) bar.querySelectorAll('.vtype-btn').forEach(b => b.classList.toggle('active', b.dataset.shapeQ === bestQ));
  updateShapeNameDisplay();
}

function updateShapeNameDisplay(){
  const q = SHAPE_QUALITIES.find(x => x.key === SHAPES_QUALITY);
  const nameEl = document.getElementById('shapeNameText');
  const tonesEl = document.getElementById('shapeTonesText');
  if(nameEl) nameEl.textContent = q ? q.label : SHAPES_QUALITY;
  if(tonesEl) tonesEl.textContent = q ? '(' + q.tones + ')' : '';
}

function renderShapeDiagram(){
  const svg = document.getElementById('shapeFb');
  if(!svg) return;
  svg.innerHTML = '';

  updateShapeNameDisplay();

  // Seed builder notes from shell voicing if empty
  if(SHAPE_BUILDER_NOTES.length === 0){
    const raw = buildShellNotes(SHAPE_ROOT_PC, SHAPES_QUALITY, SHAPES_STRING_ROOT);
    SHAPE_BUILDER_NOTES = raw.map(n => ({string:n.string, fret:n.fret, pc:(OPEN_PC[n.string]+n.fret)%12}));
    SHAPE_BASE_NOTES = SHAPE_BUILDER_NOTES.map(n => ({...n}));
  }

  if(!SHAPE_BUILDER_NOTES.length){
    svg.setAttribute('viewBox','0 0 280 200');
    const ns='http://www.w3.org/2000/svg';
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x','140'); t.setAttribute('y','100'); t.setAttribute('text-anchor','middle');
    t.setAttribute('fill','#5a3a00'); t.setAttribute('font-size','13');
    t.textContent='no shape defined'; svg.appendChild(t); return;
  }

  // Build display notes with degree labels
  const ivMap = QUALITY_INTERVALS[SHAPES_QUALITY] || QUALITY_INTERVALS.maj;
  const displayNotes = SHAPE_BUILDER_NOTES.map(n => {
    const pc = (OPEN_PC[n.string] + n.fret) % 12;
    const iv = (pc - SHAPE_ROOT_PC + 12) % 12;
    const isRoot = pc === SHAPE_ROOT_PC;
    const degree = isRoot ? 'R' : (ivMap[iv] !== undefined ? ivMap[iv] : CHROMATIC_DEGREES[iv]);
    return { string:n.string, fret:n.fret, pc, degree, isRoot };
  });

  // Root always at display slot 2 — window starts at rootFret-2, expands right to fit all notes
  const anchorStr = SHAPES_STRING_ROOT === 6 ? 0 : 1;
  const rootNote = SHAPE_BUILDER_NOTES.find(n => n.string === anchorStr);
  const rootFret = rootNote ? rootNote.fret : SHAPE_BUILDER_NOTES[0].fret;
  const allFrets = SHAPE_BUILDER_NOTES.map(n => n.fret);
  const winStart = Math.min(rootFret - 2, Math.min(...allFrets) - 1);
  const maxF = Math.max(...allFrets);
  const NF = Math.max(4, maxF - winStart);

  // Match tab 2 proportions exactly: same strGap, same NR
  const TP = 20, BP = 20, LP = 20, RP = 20;
  const strGap = 44; // (300-20-60)/5 = 44
  const fw = 63.08; // (900-60-20)/13 ≈ 63.08
  const NR = Math.min(fw * 0.44, strGap * 0.44); // = 19.36
  const H = TP + strGap * 5 + BP; // 300
  const W = LP + NF * fw + RP;    // ~292
  const nutY2 = TP + strGap * 5;

  svg.setAttribute('viewBox', `0 0 ${W.toFixed(1)} ${H}`);
  svg.style.width = Math.round(W) + 'px';

  const ns = 'http://www.w3.org/2000/svg';
  const mk = tag => document.createElementNS(ns, tag);
  const at = (e, o) => { for(const [k,v] of Object.entries(o)) e.setAttribute(k,v); return e; };
  const fx = f => LP + (f - winStart - 0.5) * fw;
  const sy = s => TP + (5 - s) * strGap;

  svg.appendChild(at(mk('rect'), {x:LP, y:TP, width:W-LP-RP, height:strGap*5, fill:'#f7eecc'}));

  for(let i=0; i<=NF; i++){
    const x = LP + i*fw;
    svg.appendChild(at(mk('line'), {x1:x,y1:TP,x2:x,y2:nutY2,stroke:'#5a3a00','stroke-width':'1.5'}));
  }
  for(let s=0; s<6; s++){
    const y = sy(s);
    svg.appendChild(at(mk('line'), {x1:LP,y1:y,x2:W-RP,y2:y,stroke:'#2a1500','stroke-width':(0.6+s*0.3).toFixed(2)}));
  }



  // Click zones for empty positions
  const occupiedKeys = new Set(SHAPE_BUILDER_NOTES.map(n => `${n.string},${n.fret}`));
  for(let s=0; s<6; s++){
    for(let f=winStart+1; f<=winStart+NF; f++){
      if(occupiedKeys.has(`${s},${f}`)) continue;
      const x = fx(f), y = sy(s);
      const hit = mk('circle');
      at(hit, {cx:x,cy:y,r:NR,fill:'rgba(0,0,0,0)',stroke:'none',cursor:'pointer'});
      hit.addEventListener('click', () => {
        const pc = (OPEN_PC[s] + f) % 12;
        const newIv = (pc - SHAPE_ROOT_PC + 12) % 12;
        SHAPE_BUILDER_NOTES = SHAPE_BUILDER_NOTES.filter(n => {
          const nIv = ((OPEN_PC[n.string] + n.fret) % 12 - SHAPE_ROOT_PC + 12) % 12;
          return n.string !== s && nIv !== newIv;
        });
        SHAPE_BUILDER_NOTES.push({string:s, fret:f, pc});
        detectShapeQuality();
        renderShapeDiagram();
      });
      svg.appendChild(hit);
    }
  }

  // Notes
  displayNotes.forEach(n => {
    if(n.fret < winStart+1 || n.fret > winStart+NF) return;
    const x = fx(n.fret), y = sy(n.string);
    const fill   = n.isRoot ? '#8b1a1a' : '#fdf5e0';
    const stroke = n.isRoot ? '#5a1010' : '#5a3a0a';
    const circ = at(mk('circle'), {cx:x,cy:y,r:NR,fill,stroke,'stroke-width':'2.5',cursor:'pointer'});
    circ.addEventListener('click', () => {
      const idx = SHAPE_BUILDER_NOTES.findIndex(bn => bn.string===n.string && bn.fret===n.fret);
      if(idx >= 0){
        // Just remove — no restore
        SHAPE_BUILDER_NOTES.splice(idx, 1);
      } else {
        const strIdx = SHAPE_BUILDER_NOTES.findIndex(bn => bn.string===n.string);
        if(strIdx >= 0) SHAPE_BUILDER_NOTES.splice(strIdx, 1);
        SHAPE_BUILDER_NOTES.push({string:n.string, fret:n.fret, pc:n.pc});
      }
      detectShapeQuality();
      renderShapeDiagram();
    });
    svg.appendChild(circ);
    const small = n.degree.length > 1;
    const t = mk('text');
    at(t, {x, y:y+6, fill: n.isRoot ? '#ffffff' : '#5a3a0a',
           'font-size': small ? '14' : '19', 'font-weight':'900',
           'font-family':"'Special Elite','Courier New',Courier,monospace",
           'text-anchor':'middle', cursor:'pointer'});
    t.textContent = n.degree;
    t.addEventListener('click', () => circ.dispatchEvent(new MouseEvent('click')));
    svg.appendChild(t);
  });
}

function switchTab(tab){
  const tips = {
    scale: 'Select buttons + click fretboard notes to highlight.',
    chord: 'Select buttons + click notes on fret to edit chord.',
    shapes: 'Select a chord quality to see its moveable shape.'
  };
  const tip = document.getElementById('helpTooltip');
  if(tip) tip.textContent = tips[tab] || '';
  const hb = document.getElementById('helpBtn');
  if(hb) hb.classList.remove('open');

  render();
}

// ── Pinch to zoom ──
(function(){
  function getWrap(){ return document.querySelector('.diagram-wrap'); }
  let svgW = 0;
  const MIN_W = 300, MAX_W = 2400;

  function initWidth(){
    const wrap = getWrap();
    if(!wrap) return;
    svgW = wrap.clientWidth || 600;
  }

  function setWidth(w){
    svgW = Math.min(MAX_W, Math.max(MIN_W, w));
    const svg = document.getElementById('fb');
    if(svg){ svg.style.width = svgW + 'px'; }
    const shapeSvg = document.getElementById('shapeFb');
    if(shapeSvg){ shapeSvg.style.width = svgW + 'px'; }
    // Re-render CAGED letters to match new SVG size
    const rootPC = getKeyPC();
    const fw = (900 - 60 - 20) / 13;
    requestAnimationFrame(() => renderCagedLetters(rootPC, fw, 60));
  }

  let lastDist = 0, pinching = false;

  document.addEventListener('touchstart', e => {
    if(e.touches.length === 2){
      if(svgW === 0) initWidth();
      pinching = true;
      lastDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      e.preventDefault();
    }
  }, {passive: false});

  document.addEventListener('touchmove', e => {
    if(pinching && e.touches.length === 2){
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if(lastDist > 0) setWidth(svgW * dist / lastDist);
      lastDist = dist;
    }
  }, {passive: false});

  document.addEventListener('touchend', e => {
    if(e.touches.length < 2){ pinching = false; lastDist = 0; }
  }, {passive: true});

  // Ctrl+scroll desktop
  document.addEventListener('wheel', e => {
    if(e.ctrlKey || e.metaKey){
      e.preventDefault();
      if(svgW === 0) initWidth();
      setWidth(svgW * (e.deltaY < 0 ? 1.1 : 0.9));
    }
  }, {passive: false});

  window.addEventListener('load', initWidth);
})();
</script>
